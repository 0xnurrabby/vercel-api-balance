<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vercel Balance</title>
<style>
/* ═══════════════════════════════════════
   RESET
═══════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

:root {
  --bg:        #ffffff;
  --bg2:       #f6f6f6;
  --bg3:       #eeeeee;
  --border:    #e8e8e8;
  --border2:   #d4d4d4;
  --text:      #0a0a0a;
  --text2:     #444444;
  --text3:     #888888;
  --text4:     #bbbbbb;
  --green:     #16a34a;
  --red:       #dc2626;
  --amber:     #d97706;
  --radius:    10px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--text);
  font-size: 13px;
}

/* ═══════════════════════════════════════
   APP — fills the entire frameless window
   Border-radius via CSS for clean corners
═══════════════════════════════════════ */
#app {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--bg);
}

/* ═══════════════════════════════════════
   TITLEBAR
═══════════════════════════════════════ */
#titlebar {
  height: 38px;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px 0 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
  border-radius: var(--radius) var(--radius) 0 0;
}
#titlebar:active { cursor: grabbing; }

.tb-left {
  display: flex; align-items: center; gap: 7px;
  pointer-events: none;
}
.tb-logo { width: 15px; height: 15px; fill: #000; flex-shrink: 0; }
.tb-title { font-size: 12.5px; font-weight: 600; color: var(--text); letter-spacing: .005em; }

.tb-right {
  display: flex; align-items: center; gap: 1px;
  pointer-events: all;
}
.ic {
  background: none; border: none; cursor: pointer;
  color: var(--text4);
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  transition: color .12s, background .12s;
}
.ic:hover { color: var(--text2); background: var(--bg3); }
.ic svg { width: 13px; height: 13px; pointer-events: none; }
.ic.close:hover { color: var(--red); background: #fee2e2; }

/* Status dot in titlebar */
#tb-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text4); flex-shrink: 0;
  transition: background .3s;
  pointer-events: none;
}
#tb-dot.live    { background: var(--green); box-shadow: 0 0 0 2px rgba(22,163,74,.18); animation: blink 2.5s infinite; }
#tb-dot.loading { background: var(--amber); box-shadow: 0 0 0 2px rgba(217,119,6,.18);  animation: blink .9s infinite; }
#tb-dot.error   { background: var(--red);   box-shadow: 0 0 0 2px rgba(220,38,38,.18); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* expand button — only visible in compact mode */
#btn-expand { display: none; }
body.compact #btn-expand  { display: flex; }
body.compact #btn-refresh { display: none; }

/* ═══════════════════════════════════════
   COMPACT BODY
═══════════════════════════════════════ */
#compact-body {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: var(--bg);
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
}

.cmp-stat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 8px 0 10px;   /* extra bottom padding above progress bar */
}
.cmp-stat + .cmp-stat {
  border-left: 1px solid var(--border);
}
.cmp-lbl {
  font-size: 8.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--text4);
  line-height: 1;
}
.cmp-val {
  font-size: 19px;
  font-weight: 800;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -.04em;
  line-height: 1;
}
.cmp-val.green { color: var(--green); }

/* ═══════════════════════════════════════
   FULL BODY
═══════════════════════════════════════ */
#full-body {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;        /* NO scrollbar ever */
  padding: 13px 13px 0;
  gap: 10px;
  min-height: 0;
}

/* Error banner */
.err-banner {
  background: #fff5f5;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 8px 11px;
  font-size: 11px;
  color: var(--red);
  line-height: 1.5;
  display: none;
  flex-shrink: 0;
}
.err-banner.show { display: block; }

/* Status row */
.st-row { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.st-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text4); flex-shrink: 0; transition: background .3s;
}
.st-dot.live    { background: var(--green); animation: blink 2.5s infinite; }
.st-dot.loading { background: var(--amber); animation: blink .9s infinite; }
.st-dot.error   { background: var(--red); }
.st-txt { font-size: 11px; color: var(--text3); }

/* Balance cards */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  flex-shrink: 0;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px 11px;
}
.card.full { grid-column: 1/-1; }
.c-lbl {
  font-size: 8.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .09em;
  color: var(--text4); margin-bottom: 4px;
}
.c-val {
  font-size: 23px; font-weight: 800;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -.04em; line-height: 1;
}
.c-val.sm { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0; }
.c-sub { font-size: 9.5px; color: var(--text4); margin-top: 3px; }

.shimmer { animation: sh 1.1s infinite; }
@keyframes sh { 0%,100%{opacity:.25} 50%{opacity:.9} }

/* Separator */
.sep { height: 1px; background: var(--border); margin: 0 -13px; flex-shrink: 0; }

/* Section label */
.sec-lbl {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--text4); flex-shrink: 0;
}

/* API key row */
.key-row { display: flex; gap: 6px; flex-shrink: 0; }
.inp {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 11.5px;
  font-family: 'SF Mono','Fira Code','Menlo',monospace;
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  min-width: 0;
}
.inp::placeholder { color: var(--text4); }
.inp:focus {
  border-color: #000;
  box-shadow: 0 0 0 3px rgba(0,0,0,.07);
  background: #fff;
}
.btn-black {
  background: #000; border: none; border-radius: 8px;
  padding: 7px 13px; font-size: 11.5px; font-weight: 600;
  color: #fff; cursor: pointer; white-space: nowrap;
  transition: background .12s, transform .1s; flex-shrink: 0;
}
.btn-black:hover  { background: #1a1a1a; }
.btn-black:active { transform: scale(.97); }

.key-hint { font-size: 10px; color: var(--green); flex-shrink: 0; }

/* Compact toggle */
.toggle-row {
  display: flex; align-items: center; gap: 7px; flex-shrink: 0;
}
.toggle-row label {
  font-size: 11.5px; color: var(--text2);
  cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 7px;
}
/* custom pill checkbox */
.toggle-row input[type=checkbox] { display: none; }
.pill {
  width: 34px; height: 19px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 99px;
  position: relative;
  cursor: pointer;
  transition: background .2s, border-color .2s;
  flex-shrink: 0;
}
.pill::after {
  content: '';
  position: absolute;
  left: 2px; top: 2px;
  width: 13px; height: 13px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
  transition: transform .2s;
}
input[type=checkbox]:checked + .pill {
  background: #000; border-color: #000;
}
input[type=checkbox]:checked + .pill::after {
  transform: translateX(15px);
}

/* Bulk button */
.bulk-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer; font-size: 12px; font-weight: 500;
  color: var(--text2);
  transition: background .13s, border-color .13s, color .13s;
  width: 100%; text-align: left; flex-shrink: 0;
}
.bulk-btn:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }
.bulk-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.bulk-btn .arr { margin-left: auto; color: var(--text4); }

/* ── FOOTER ────────────────── */
#full-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px 11px;
  flex-shrink: 0;
}
.ft-time { font-size: 10px; color: var(--text4); }
.isel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 7px;
  font-size: 10px; color: var(--text3);
  cursor: pointer; outline: none;
  transition: border-color .13s;
}
.isel:hover { border-color: var(--border2); }
.isel option { background: #fff; }

/* Progress bar */
#prog-bar {
  height: 2px; background: var(--bg3);
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden; flex-shrink: 0;
}
#prog-fill { height: 100%; background: #000; width: 0%; }

/* ═══════════════════════════════════════
   BULK BODY
═══════════════════════════════════════ */
#bulk-body {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
  padding: 12px 13px 13px;
  gap: 10px;
}

.bulk-top {
  display: flex; gap: 8px; flex-shrink: 0;
}
.bulk-ta {
  flex: 1; height: 92px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 10px;
  font-size: 11px; font-family: 'SF Mono','Fira Code','Menlo',monospace;
  color: var(--text); resize: none; outline: none;
  transition: border-color .15s; line-height: 1.7;
}
.bulk-ta::placeholder { color: var(--text4); line-height: 1.9; }
.bulk-ta:focus { border-color: #000; }

.bulk-run {
  background: #000; border: none; border-radius: 9px;
  width: 60px; height: 92px;
  font-size: 10.5px; font-weight: 700;
  color: #fff; cursor: pointer; flex-shrink: 0;
  writing-mode: vertical-rl; letter-spacing: .08em;
  transition: background .13s;
}
.bulk-run:hover    { background: #1a1a1a; }
.bulk-run:disabled { background: #aaa; cursor: not-allowed; }

.bulk-scroll {
  flex: 1; overflow-y: auto; min-height: 0;
  border: 1px solid var(--border);
  border-radius: 10px; background: var(--bg2);
}
.bulk-empty {
  height: 100%; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; color: var(--text4); font-size: 12px; text-align: center;
  line-height: 1.7; padding: 20px;
}
.bulk-empty svg { opacity: .25; }

table.bt { width: 100%; border-collapse: collapse; }
table.bt th {
  position: sticky; top: 0;
  background: var(--bg3); z-index: 1;
  font-size: 8.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--text4); padding: 7px 11px;
  text-align: left; border-bottom: 1px solid var(--border);
}
table.bt td {
  padding: 8px 11px; font-size: 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
table.bt tr:last-child td { border-bottom: none; }
table.bt tr:hover td { background: #f4f4f4; }

.td-key {
  font-family: 'SF Mono','Fira Code',monospace;
  font-size: 10.5px; color: var(--text2);
  max-width: 180px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.td-bal { font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.td-used { color: var(--text3); font-variant-numeric: tabular-nums; white-space: nowrap; }

.badge {
  display: inline-block; font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  padding: 2px 6px; border-radius: 5px;
}
.badge.ok   { background: #dcfce7; color: #15803d; }
.badge.err  { background: #fee2e2; color: #b91c1c; }
.badge.wait { background: #fef9c3; color: #92400e; }

.bulk-sumbar {
  display: flex; gap: 14px; flex-shrink: 0;
  padding-top: 2px;
}
.sum-it { font-size: 11px; color: var(--text3); }
.sum-it b { color: var(--text); }

.bulk-actions { display: flex; gap: 7px; flex-shrink: 0; }
.btn-gray {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 14px;
  font-size: 11.5px; font-weight: 600; color: var(--text2);
  cursor: pointer; transition: background .13s;
}
.btn-gray:hover { background: var(--border); }
</style>
</head>
<body>
<div id="app">

<!-- ═══════ TITLEBAR ═══════ -->
<div id="titlebar">
  <div class="tb-left">
    <svg class="tb-logo" viewBox="0 0 76 65"><path d="M37.5274 0L75.0548 65H0Z"/></svg>
    <span class="tb-title">Vercel Balance</span>
    <div id="tb-dot"></div>
  </div>
  <div class="tb-right">
    <button class="ic" id="btn-refresh" title="Refresh now">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <!-- expand button: only shown in compact mode -->
    <button class="ic" id="btn-expand" title="Expand to full view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
    <button class="ic" id="btn-min" title="Minimize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button class="ic close" id="btn-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>

<!-- ═══════ COMPACT BODY ═══════ -->
<div id="compact-body">
  <div class="cmp-stat">
    <span class="cmp-lbl">Balance</span>
    <span class="cmp-val green" id="c-bal">--</span>
  </div>
  <div class="cmp-stat">
    <span class="cmp-lbl">Used</span>
    <span class="cmp-val" id="c-used">--</span>
  </div>
</div>

<!-- ═══════ FULL BODY ═══════ -->
<div id="full-body">

  <div class="err-banner" id="err-banner"></div>

  <div class="st-row">
    <div class="st-dot" id="st-dot"></div>
    <span class="st-txt" id="st-txt">Enter your API key below</span>
  </div>

  <div class="cards">
    <div class="card">
      <div class="c-lbl">Balance</div>
      <div class="c-val" id="f-bal">--</div>
      <div class="c-sub">remaining</div>
    </div>
    <div class="card">
      <div class="c-lbl">Total Used</div>
      <div class="c-val" id="f-used">--</div>
      <div class="c-sub">all time</div>
    </div>
    <div class="card full">
      <div class="c-lbl">Account</div>
      <div class="c-val sm" id="f-acct">—</div>
    </div>
  </div>

  <div class="sep"></div>

  <div class="sec-lbl">API Key</div>
  <div class="key-row">
    <input type="password" class="inp" id="key-inp" placeholder="Paste Vercel token…" autocomplete="off" spellcheck="false"/>
    <span class="key-hint" id="key-hint"></span>
    <button class="btn-black" id="btn-save">Save</button>
  </div>

  <div class="sep"></div>

  <div class="toggle-row">
    <label>
      <input type="checkbox" id="compact-chk"/>
      <span class="pill"></span>
      Compact mode
    </label>
  </div>

  <button class="bulk-btn" id="btn-bulk">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
    </svg>
    Bulk API Key Tester
    <svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

</div><!-- /full-body -->

<!-- ═══════ FULL FOOTER ═══════ -->
<div id="full-footer">
  <span class="ft-time" id="ft-time">Never updated</span>
  <select class="isel" id="isel">
    <option value="1000">1s</option>
    <option value="2000">2s</option>
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000" selected>5s</option>
    <option value="10000">10s</option>
  </select>
</div>

<div id="prog-bar"><div id="prog-fill"></div></div>

<!-- ═══════ BULK BODY ═══════ -->
<div id="bulk-body">

  <div class="bulk-top">
    <textarea class="bulk-ta" id="bulk-ta"
      placeholder="One API key per line:&#10;&#10;tok_abc123...&#10;tok_def456..."></textarea>
    <button class="bulk-run" id="btn-bulk-run">Check All</button>
  </div>

  <div class="bulk-scroll" id="bulk-scroll">
    <div class="bulk-empty" id="bulk-empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      Paste API keys above<br/>and click <b>Check All</b>
    </div>
    <table class="bt" id="bulk-tbl" style="display:none">
      <thead><tr>
        <th>Key</th><th>Balance</th><th>Used</th><th>Status</th>
      </tr></thead>
      <tbody id="bulk-tbody"></tbody>
    </table>
  </div>

  <div class="bulk-sumbar" id="bulk-sum" style="display:none">
    <span class="sum-it">Keys: <b id="s-keys">0</b></span>
    <span class="sum-it">Balance: <b id="s-bal">$0.00</b></span>
    <span class="sum-it">Used: <b id="s-used">$0.00</b></span>
  </div>

  <div class="bulk-actions">
    <button class="btn-gray" id="btn-back">← Back</button>
    <button class="btn-black" id="btn-bulk-run2" style="flex:1">Check All</button>
  </div>

</div><!-- /bulk-body -->

</div><!-- /app -->
<script>
/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
const $  = id => document.getElementById(id);
const E  = window.electron;

function usd (v) {
  const n = parseFloat(v);
  return isNaN(n) ? '--' : '$' + n.toFixed(2);
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let apiKey   = '';
let mode     = 'full';
let timer    = null;
let interval = 5000;

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
async function init () {
  apiKey   = await E.storeGet('apiKey')   || '';
  interval = parseInt(await E.storeGet('interval') || '5000', 10);
  $('isel').value = String(interval);

  const savedMode = await E.storeGet('mode') || 'full';
  if (savedMode === 'compact') $('compact-chk').checked = true;
  applyMode(savedMode === 'bulk' ? 'full' : savedMode);

  if (apiKey) {
    $('key-hint').textContent = '✓ saved';
    fetchBalance();
  } else {
    setStatus('idle', 'Enter your API key below');
  }
  restartTimer();
}

/* ══════════════════════════════════════
   MODE
══════════════════════════════════════ */
function applyMode (m) {
  mode = m;
  $('compact-body').style.display  = m === 'compact' ? 'flex'  : 'none';
  $('full-body').style.display     = m === 'full'    ? 'flex'  : 'none';
  $('bulk-body').style.display     = m === 'bulk'    ? 'flex'  : 'none';
  $('full-footer').style.display   = m === 'full'    ? 'flex'  : 'none';
  $('prog-bar').style.display      = m === 'bulk'    ? 'none'  : 'block';

  // body class drives CSS visibility of expand vs refresh button
  document.body.className = m;

  // keep checkbox in sync
  $('compact-chk').checked = (m === 'compact');

  E.setMode(m);
  E.storeSet('mode', m);
}

/* ══════════════════════════════════════
   DRAG — smooth, no per-frame IPC
   Main process polls cursor position;
   renderer only sends mousedown + mouseup
══════════════════════════════════════ */
$('titlebar').addEventListener('mousedown', e => {
  if (e.target.closest('button')) return;
  e.preventDefault();
  // offX/offY = cursor position relative to window top-left
  // e.screenX/Y is absolute; e.clientX/Y is relative to window content
  E.dragStart(e.screenX - window.screenX, e.screenY - window.screenY);
  document.body.style.cursor = 'grabbing';
});

document.addEventListener('mouseup', () => {
  E.dragEnd();
  document.body.style.cursor = '';
});

// Safety: also end drag if mouse leaves the window
document.addEventListener('mouseleave', () => {
  E.dragEnd();
  document.body.style.cursor = '';
});

/* ══════════════════════════════════════
   TITLEBAR BUTTONS
══════════════════════════════════════ */
$('btn-close').addEventListener('click',  () => E.close());
$('btn-min').addEventListener('click',    () => E.minimize());
$('btn-expand').addEventListener('click', () => {
  $('compact-chk').checked = false;
  applyMode('full');
});
$('btn-refresh').addEventListener('click', () => {
  if (apiKey) { fetchBalance(); startProgress(); }
});

/* ══════════════════════════════════════
   COMPACT TOGGLE
══════════════════════════════════════ */
$('compact-chk').addEventListener('change', e => {
  applyMode(e.target.checked ? 'compact' : 'full');
});

/* ══════════════════════════════════════
   SAVE KEY
══════════════════════════════════════ */
$('btn-save').addEventListener('click', saveKey);
$('key-inp').addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });

async function saveKey () {
  const v = $('key-inp').value.trim();
  if (!v) return;
  apiKey = v;
  await E.storeSet('apiKey', apiKey);
  $('key-inp').value = '';
  $('key-hint').textContent = '✓ saved';
  fetchBalance();
  restartTimer();
}

/* ══════════════════════════════════════
   INTERVAL
══════════════════════════════════════ */
$('isel').addEventListener('change', () => {
  interval = parseInt($('isel').value, 10);
  E.storeSet('interval', String(interval));
  restartTimer();
});

/* ══════════════════════════════════════
   BULK MODE
══════════════════════════════════════ */
$('btn-bulk').addEventListener('click',     () => applyMode('bulk'));
$('btn-back').addEventListener('click',     () => {
  applyMode($('compact-chk').checked ? 'compact' : 'full');
});
$('btn-bulk-run').addEventListener('click',  runBulk);
$('btn-bulk-run2').addEventListener('click', runBulk);

async function runBulk () {
  const raw  = $('bulk-ta').value.trim();
  if (!raw) return;
  const keys = raw.split(/[\n,]+/).map(k => k.trim()).filter(Boolean);
  if (!keys.length) return;

  $('bulk-empty').style.display = 'none';
  $('bulk-tbl').style.display   = 'table';
  $('bulk-sum').style.display   = 'flex';
  $('btn-bulk-run').disabled    = true;
  $('btn-bulk-run2').disabled   = true;

  const tbody = $('bulk-tbody');
  tbody.innerHTML = '';

  keys.forEach((key, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-key" title="${key}">${maskKey(key)}</td>
      <td class="td-bal" id="bl${i}">…</td>
      <td class="td-used" id="us${i}">…</td>
      <td id="st${i}"><span class="badge wait">Wait</span></td>`;
    tbody.appendChild(tr);
  });

  let totBal = 0, totUsed = 0, ok = 0;
  const BATCH = 5;

  for (let i = 0; i < keys.length; i += BATCH) {
    await Promise.all(keys.slice(i, i + BATCH).map(async (key, bi) => {
      const idx = i + bi;
      try {
        const res  = await fetch('https://ai-gateway.vercel.sh/v1/credits', {
          headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const d   = await res.json();
        const bal = parseFloat(d.balance    || 0);
        const use = parseFloat(d.total_used || 0);
        totBal  += bal; totUsed += use; ok++;
        $('bl' + idx).textContent = '$' + bal.toFixed(2);
        $('us' + idx).textContent = '$' + use.toFixed(2);
        $('st' + idx).innerHTML   = '<span class="badge ok">OK</span>';
      } catch {
        $('bl' + idx).textContent = '—';
        $('us' + idx).textContent = '—';
        $('st' + idx).innerHTML   = '<span class="badge err">Error</span>';
      }
    }));
  }

  $('s-keys').textContent  = keys.length + ' (' + ok + ' ok)';
  $('s-bal').textContent   = '$' + totBal.toFixed(2);
  $('s-used').textContent  = '$' + totUsed.toFixed(2);
  $('btn-bulk-run').disabled  = false;
  $('btn-bulk-run2').disabled = false;
}

function maskKey (k) {
  if (k.length <= 10) return k;
  return k.slice(0, 7) + '…' + k.slice(-5);
}

/* ══════════════════════════════════════
   FETCH BALANCE
══════════════════════════════════════ */
async function fetchBalance () {
  if (!apiKey) return;
  setStatus('loading', 'Fetching…');
  shim(true);

  try {
    const res = await fetch('https://ai-gateway.vercel.sh/v1/credits', {
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' }
    });
    if (!res.ok) {
      const b = await res.json().catch(() => ({}));
      if (res.status === 401 || res.status === 403) throw new Error('Invalid token.');
      throw new Error(b?.error?.message || b?.message || 'HTTP ' + res.status);
    }
    const d   = await res.json();
    const bal = usd(d.balance);
    const use = usd(d.total_used);

    setVals(bal, use);
    hideErr();
    setStatus('live', 'Live');
    $('ft-time').textContent = 'Updated ' + new Date().toLocaleTimeString();

    // user info (non-critical)
    fetch('https://api.vercel.com/v2/user', {
      headers: { 'Authorization': 'Bearer ' + apiKey }
    }).then(r => r.ok ? r.json() : null).then(ud => {
      if (!ud) return;
      const u = ud.user || ud;
      $('f-acct').textContent = u.name || u.username || u.email || '—';
    }).catch(() => {});

  } catch (e) {
    setStatus('error', 'Error');
    showErr(e.message || 'Unknown error');
    setVals('!', '!');
  } finally {
    shim(false);
  }
}

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function setVals (bal, use) {
  $('f-bal').textContent   = bal;
  $('f-used').textContent  = use;
  $('c-bal').textContent   = bal;
  $('c-used').textContent  = use;
}

function shim (on) {
  [$('f-bal'), $('f-used'), $('c-bal'), $('c-used')].forEach(e => {
    e.classList.toggle('shimmer', on);
  });
}

function setStatus (s, msg) {
  $('tb-dot').className = s;
  $('st-dot').className = 'st-dot ' + s;
  $('st-txt').textContent = msg;
}

function showErr (msg) {
  const b = $('err-banner');
  b.textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 7000);
}
function hideErr () { $('err-banner').classList.remove('show'); }

/* ══════════════════════════════════════
   PROGRESS
══════════════════════════════════════ */
function startProgress () {
  const f = $('prog-fill');
  f.style.transition = 'none';
  f.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    f.style.transition = `width ${interval}ms linear`;
    f.style.width = '100%';
  }));
}

function restartTimer () {
  clearInterval(timer);
  startProgress();
  timer = setInterval(() => {
    if (apiKey && mode !== 'bulk') { fetchBalance(); startProgress(); }
  }, interval);
}

init();
</script>
</body>
</html>
